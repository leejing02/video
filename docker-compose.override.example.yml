# =====================================================================
# 本地调试用的覆盖文件
#
# 用法：
#   cp docker-compose.override.example.yml docker-compose.override.yml
#   docker compose up -d
#
# Compose 会自动把 override 与 docker-compose.yml 合并。这份文件:
#   - 把 mysql / redis 端口映射到主机（方便用 TablePlus 等工具直连）
#   - 把 api / admin 也额外暴露主机端口（不通过 Traefik 也能直连）
#
# 注意挑没人占用的主机端口；如果某个端口冲突，改这里的左侧值即可。
# 这个文件不入库（已加到 .gitignore），改完不影响别人。
# =====================================================================

services:
  mysql:
    ports:
      - "3307:3306"   # 改成 3306 也行，前提是主机没人占

  redis:
    ports:
      - "6380:6379"

  api:
    ports:
      - "8002:8000"   # http://localhost:8002/api/...

  admin:
    ports:
      - "8003:80"     # http://localhost:8003/admin
